<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Whispers in the Pew</title>
<meta name="description" content="Contact Whispers in the Pew.">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16.png">
<link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">
</head>
<body>
<div id="header"></div>
<section class="hero-small" style="background:
  linear-gradient(rgba(0,0,0,.72), rgba(0,0,0,.72)),
  url('assets/images/appalachian-hero.jpg');">
  <div class="hero-inner">
    <h1 class="h1">Contact</h1>
    <p class="tagline">Reach out with care and respect.</p>
  </div>
</section>

<main class="container">
  <div class="grid">
    <section class="panel prose" style="max-width:600px; margin:0 auto; text-align:center;">

  <h2>You are welcome here</h2>

  <p>You can share what is on your heart. You are not alone.</p>

  <p style="color:var(--muted); font-size:.95rem;">
    You will not be dismissed. Your voice matters.
  </p>

  <div style="margin:20px 0;">
    <button class="btn" onclick="setMode('prayer')">I need prayer</button>
    <button class="btn" onclick="setMode('talk')">I need to talk</button>
    <button class="btn" onclick="setMode('question')">I have a question</button>
  </div>

  <form action="https://formspree.io/f/mzdajjkb" method="POST" onsubmit="handleSubmit(event)">

  <textarea name="message" id="messageBox" placeholder="Share what is on your heart..." required></textarea>

  <input type="hidden" name="Request Type" id="messageType" value="not specified">

  <br><br>

  <button class="btn" type="submit">Send</button>

</form>

  <p style="color:var(--muted); font-size:.85rem; margin-top:12px;">
    Share only what you feel comfortable sharing.
  </p>

  <div id="confirmation" style="margin-top:18px; color:var(--muted);"></div>

</section>
  </div>
</main>

<div id="footer"></div>

  <script src="/whispers-in-the-pew/script.js"></script>
</body>
</html>
