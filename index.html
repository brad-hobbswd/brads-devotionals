<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispers in the Pew</title>

<meta name="description" content="Candlelit devotions for quiet faith and deeper knowledge of Jesus.">

<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16.png">
<link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">
</head>

<body>

<div id="header"></div>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <img class="logo-hero" src="assets/images/logo-seal.png" alt="Whispers in the Pew">
    <h1 class="h1">Whispers in the Pew</h1>
    <p class="tagline">Candlelit devotions for quiet faith and deeper knowledge of Jesus.</p>
    <div class="divider"></div>
    <button class="btn" onclick="navigateTo('devotions')">Read devotions</button>
  </div>
</section>

<!-- MAIN -->
<main class="container">
  <div class="grid">

    <section class="panel">
      <h2>Featured devotion</h2>
      <p class="meta">Faith that became mine</p>

      <div class="card">
        <h3>Faith That Became Mine</h3>
        <p>A quiet hunger to know Jesus personally.</p>
        <button class="btn" onclick="window.location.href='devotions/faith-that-became-mine.html'">
          Open devotion
        </button>
      </div>
    </section>

    <section class="panel prose">
      <h2>Scripture light</h2>
      <blockquote>John 14:18</blockquote>
      <p>Quiet moments can become sacred moments.</p>
    </section>

  </div>
</main>

<!-- FOOTER -->
<div id="footer"></div>

<script src="/whispers-in-the-pew/script.js"></script>

</body>
</html>
